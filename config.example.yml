# aave-leverage-strategy config
# Edit these values before your first run.
# WARNING: This file contains your wallet address — do not commit it.

# ---------------------------------------------------------------
# PAPER TRADING (default: true)
# Set to false only after validating with at least 20 paper cycles.
# ---------------------------------------------------------------
paper_trading: true
paper_seed_usd: 10000    # simulated collateral for paper mode — set to 0 to use real Aave balance

# ---------------------------------------------------------------
# ASSET TO TRADE
# One position at a time. Change asset + position_id together.
# ---------------------------------------------------------------
asset: "WETH"               # WETH | cbBTC | wstETH  (long collateral)
position_id: "WETH/USDC"    # WETH/USDC | cbBTC/USDC | wstETH/WETH

short_borrow_asset: "WETH"  # asset to short (borrow) — WETH or cbBTC
short_position_id: "USDC/WETH"  # USDC/WETH | USDC/cbBTC

user_address: "0xYOUR_BOT_WALLET_ADDRESS"

# ---------------------------------------------------------------
# MCP SERVER CONNECTION
# Get your session token by calling POST /mcp/auth (see SETUP.md)
# ---------------------------------------------------------------
mcp_url: "https://aave-leverage-agent-production.up.railway.app"
mcp_session_token: ""          # paste initial token here (scripts/buy_session.py)
mcp_session_duration: "month"  # auto-renewal duration: hour | day | week | month
private_key: ""                # live mode only — prefer env var PRIVATE_KEY, never commit

# ---------------------------------------------------------------
# POSITION SIZING
# seed_usd = wallet_balance_usd x base_position_pct x signal_multiplier
# ---------------------------------------------------------------
# LEVERAGE SEMANTICS: balance-sheet leverage (total_assets / equity).
# The seed token drives the difference between longs and shorts:
#
#   LONG  seed = cbBTC → BTC exposure = leverage (seed IS BTC)
#     long_leverage: 3  → supply 3×seed cbBTC, borrow 2×seed USDC → 3x BTC long exposure
#     Rule: want Nx long exposure → set long_leverage = N
#
#   SHORT seed = USDC  → BTC exposure = leverage - 1 (seed is NOT BTC)
#     short_leverage: 3 → supply 3×seed USDC, borrow 2×seed cbBTC → 2x BTC short exposure
#     Rule: want Nx short exposure → set short_leverage = N+1
leverage: 3.0               # default balance-sheet leverage for both directions
long_leverage: 3.0          # 3x balance-sheet = 3x BTC long exposure (seed is BTC)
short_leverage: 3.0         # 3x balance-sheet = 2x BTC short exposure (seed is USDC)
max_leverage: 4.0
base_position_pct: 0.20     # use 20% of wallet collateral balance as base seed
strong_signal_size: 1.0     # multiplier for strong signal (all 3 timeframes aligned)
moderate_signal_size: 0.5   # multiplier for moderate signal (2/3 timeframes aligned)

# ---------------------------------------------------------------
# EXIT THRESHOLDS
# Based on % move in the underlying asset from entry price.
# ---------------------------------------------------------------
take_profit_pct: 5.0        # close when asset is up 5% from entry (default both directions)
long_take_profit_pct: 0.0   # override TP for longs only (0 = use take_profit_pct)
short_take_profit_pct: 0.0  # override TP for shorts only (0 = use take_profit_pct)
stop_loss_pct: 3.0          # close when asset is down 3% from entry (default both directions)
long_stop_loss_pct: 0.0     # override SL for longs only (0 = use stop_loss_pct)
short_stop_loss_pct: 0.0    # override SL for shorts only (0 = use stop_loss_pct)

# Signal reversal exit: close a position when the trend signal flips against it.
# Trend-following literature strongly recommends this over fixed TP (which caps winners).
# signal_reversal_min_score: 0 = only close on full reversal (strong_short/strong_long)
#                             1 = close on moderate or strong reversal
#                             2 = close on any opposing signal
signal_reversal_exit: true
signal_reversal_min_score: 1   # 1 = moderate or strong reversal triggers close; 0 = strong only
min_hold_hours: 2.0            # minimum hours before signal reversal can trigger (prevents 30-min whipsaw)

# Time-based exit: close after N days to prevent carry drag and HF drift.
# At 8% USDC borrow APR a $10K 2x long costs ~$2.20/day in carry.
# Set to 0 to disable.
max_hold_days: 14.0

# TP suppression on strong signal: when false (default), take-profit is skipped if the
# signal is still at maximum strength (score=3 for longs, score=0 for shorts).
# SL always applies. Set true to restore fixed-TP behaviour.
tp_on_strong_signal: false

# Post-TP gate: after a take-profit close, require max-strength signal to reopen same direction.
# Prevents immediately re-entering into the same move that just TP'd at moderate signal.
# Gate expires after post_tp_gate_hours hours. Set 0 to never expire (requires strong signal always).
post_tp_gate_hours: 48.0

# ---------------------------------------------------------------
# NO-TRADE FILTERS
# These suppress new entries when conditions are unfavorable.
# ---------------------------------------------------------------
max_borrow_apr: 8.0         # skip entries if USDC borrow APR > 8% (from get_position rates)
max_volatility_1h: 5.0      # skip the entire cycle if 1h price move > 5% (spike risk)
btc_dominance_rise_threshold: 2.0  # suppress longs if BTC dominance rose > 2% since last cycle

# Funding rate filter: Binance perpetual funding rate in % per 8h.
# Positive = longs pay shorts. Extreme positive → crowded trade → suppress new longs.
# 0.05% per 8h ≈ 54% annualised. Set to 0.5 to effectively disable.
max_funding_rate_long: 0.05   # skip longs if Binance perp funding > 0.05% per 8h
max_funding_rate_short: 0.05  # skip shorts if funding < -0.05% per 8h

# Fear & Greed Index (alternative.me): 0=extreme fear, 100=extreme greed.
# Extreme greed historically precedes reversals; extreme fear = capitulation.
max_fear_greed_long: 85       # skip longs if F&G >= 85
min_fear_greed_short: 15      # skip shorts if F&G <= 15 AND RSI < fear_greed_short_rsi_floor
fear_greed_short_rsi_floor: 35.0  # F&G short block lifted once RSI recovers above this (oversold gone)

# Volume filter: skip new entries if 24h spot volume (USD) is below threshold.
# Low volume = weak conviction. Set to 0 to disable (default).
# Example thresholds: cbBTC ~$500M, WETH ~$3B (check CoinGecko for typical levels).
min_volume_24h_usd: 0

# ---------------------------------------------------------------
# ON-CHAIN DATA (Base RPC — read-only, free public endpoint)
# ---------------------------------------------------------------
rpc_url: "https://mainnet.base.org"  # free public Base RPC; use paid RPC in live mode

# USDC pool utilization: Aave's interest rate curve has a kink at ~90%.
# Above the kink, variable borrow APR climbs steeply and non-linearly.
# Suppress new entries when we're already deep in high-rate territory.
max_usdc_utilization: 0.92           # e.g. 0.92 = 92% — near the rate kink

# Recent liquidations on Aave v3 Base (last ~5 minutes / 150 blocks).
# A spike indicates a liquidation cascade — don't open leveraged positions into one.
max_recent_liquidations: 3

# ---------------------------------------------------------------
# RISK GUARDRAILS
# These trigger defensive actions on an open position.
# ---------------------------------------------------------------
hf_defense_reduce: 1.35     # call prepare_reduce if health factor drops below this
hf_defense_close: 1.20      # force close if health factor drops below this
min_open_hf: 1.30           # don't open a new position if projected HF would be below this
